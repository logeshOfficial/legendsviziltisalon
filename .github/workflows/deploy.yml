name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  repository_dispatch:
    types: [sanity-content-update, manual-publish]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /legendsviziltisalon
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: "2024-01-01"
          NEXT_PUBLIC_SANITY_WRITE_TOKEN: ${{ secrets.NEXT_PUBLIC_SANITY_WRITE_TOKEN }}
          NEXT_PUBLIC_ADMIN_USERNAME: ${{ secrets.NEXT_PUBLIC_ADMIN_USERNAME }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
          NEXT_PUBLIC_GITHUB_DEPLOY_TOKEN: ${{ secrets.NEXT_PUBLIC_GITHUB_DEPLOY_TOKEN }}

      - name: Verify Sanity data was fetched
        run: |
          echo "=== Env check ==="
          echo "Project ID set: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID != '' }}"
          echo "Write token set: ${{ secrets.NEXT_PUBLIC_SANITY_WRITE_TOKEN != '' }}"
          echo "=== Checking if Sanity data was embedded in build ==="
          echo "Searching for Sanity CDN URLs in built output..."
          grep -r "cdn.sanity.io" out/ --include="*.html" -l | head -5 || echo "No CDN URLs found — data may not have been fetched"
          echo "Checking for placeholder data markers..."
          grep -r "post-01.jpg" out/ --include="*.html" -l | head -3 && echo "WARNING: placeholder images found" || echo "OK: no placeholder images"
          echo "=== Raw Sanity API test ==="
          PROJECT_ID="${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}"
          TOKEN="${{ secrets.NEXT_PUBLIC_SANITY_WRITE_TOKEN }}"
          if [ -z "$PROJECT_ID" ]; then
            echo "ERROR: NEXT_PUBLIC_SANITY_PROJECT_ID secret is empty!"
          else
            echo "Project ID length: ${#PROJECT_ID}"
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "https://$PROJECT_ID.api.sanity.io/v2024-01-01/data/query/production?query=*%5B_type%3D%3D%22service%22%5D%7C%20order(order%20asc)%5B0...3%5D%7B_id%2Cname%2Cprice%7D")
            echo "Sanity API HTTP status: $RESPONSE"
            BODY=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://$PROJECT_ID.api.sanity.io/v2024-01-01/data/query/production?query=*%5B_type%3D%3D%22service%22%5D%7C%20order(order%20asc)%5B0...3%5D%7B_id%2Cname%2Cprice%7D")
            echo "Response body: $BODY"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
